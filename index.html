<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物件告別儀式</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #D4E4FF 0%, #E2D1F9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { text-align: center; color: #444; margin-bottom: 20px; font-weight: 500; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 5px; font-weight: bold; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8);
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        input:focus, textarea:focus { border-color: #8ec5fc; }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button {
            flex: 1;
            padding: 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-next { background: #000; color: #fff; }
        .btn-prev { background: rgba(0,0,0,0.05); color: #666; }

        .upload-area {
            background: rgba(255, 255, 255, 0.5);
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .preview-img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: none; }
        #loading { display: none; text-align: center; padding: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <form id="ritualForm">
        <div class="step active" id="step1">
            <h2>基本資料</h2>
            <div class="form-group"><label>姓名</label><input type="text" name="userName" required></div>
            <div class="form-group"><label>年齡</label><input type="number" name="userAge" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="userEmail" required></div>
            <div class="form-group"><label>職業</label><input type="text" name="userJob" required></div>
            <div class="form-group">
                <label>最高學歷</label>
                <select name="userEdu" required>
                    <option value="">請選擇</option>
                    <option>高中職</option><option>大學</option><option>碩士</option><option>博士</option><option>其他</option>
                </select>
            </div>
            <div class="btn-group"><button type="button" class="btn-next" onclick="validateAndNext(2)">下一步</button></div>
        </div>

        <div class="step" id="step2">
            <h2>日常物件</h2>
            <div class="form-group">
                <label>溫柔語氣物件名稱</label>
                <input type="text" name="gentleItem" required>
            </div>
            <div class="form-group">
                <label>選擇原因</label>
                <textarea name="gentleReason" required></textarea>
            </div>
            <div class="form-group">
                <label>溫柔物件照片</label>
                <input type="file" accept="image/*" required onchange="preview(this, 'pGentle', 'iGentle')">
                <img id="pGentle" class="preview-img">
                <input type="hidden" name="imgGentle" id="iGentle" required>
            </div>
            <hr style="border: 0.5px solid rgba(0,0,0,0.05); margin: 20px 0;">
            <div class="form-group">
                <label>尖銳語氣物件名稱</label>
                <input type="text" name="sharpItem" required>
            </div>
            <div class="form-group">
                <label>選擇原因</label>
                <textarea name="sharpReason" required></textarea>
            </div>
            <div class="form-group">
                <label>尖銳物件照片</label>
                <input type="file" accept="image/*" required onchange="preview(this, 'pSharp', 'iSharp')">
                <img id="pSharp" class="preview-img">
                <input type="hidden" name="imgSharp" id="iSharp" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="go(1)">回上頁</button>
                <button type="button" class="btn-next" onclick="validateAndNext(3)">下一步</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h2>告別物件</h2>
            <div class="form-group"><label>物件名稱</label><input type="text" name="farewellItem" required></div>
            <div class="form-group"><label>基本功能與外觀</label><textarea name="itemDetail" required></textarea></div>
            <div class="form-group"><label>使用時長（特徵描述）</label><input type="text" name="duration" required></div>
            <div class="form-group"><label>記憶或情感連結</label><textarea name="memory" required></textarea></div>
            <div class="form-group"><label>猶豫告別的原因</label><textarea name="hesitate" required></textarea></div>
            <div class="form-group">
                <label>相對位置照片 (告別物件與兩物件)</label>
                <input type="file" accept="image/*" required onchange="preview(this, 'pFarewell', 'iFarewell')">
                <img id="pFarewell" class="preview-img">
                <input type="hidden" name="imgFarewell" id="iFarewell" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="go(2)">回上頁</button>
                <button type="button" class="btn-next" onclick="finalSubmit()">完成</button>
            </div>
        </div>
    </form>
    <div id="loading">✨ 正在珍藏您的紀錄，請稍候...</div>
</div>

<script>
    // 這裡替換成你的 Google Script 網址
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-你的ID/exec"; 

    function go(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        window.scrollTo(0,0);
    }

    function validateAndNext(n) {
        const currentStep = document.querySelector('.step.active');
        const inputs = currentStep.querySelectorAll('input, select, textarea');
        let valid = true;
        inputs.forEach(input => {
            if (!input.checkValidity()) {
                input.reportValidity();
                valid = false;
            }
        });
        if (valid) go(n);
    }

    function preview(input, imgId, hiddenId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(imgId).src = e.target.result;
                document.getElementById(imgId).style.display = 'block';
                document.getElementById(hiddenId).value = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    async function finalSubmit() {
        const form = document.getElementById('ritualForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const data = {};
        new FormData(form).forEach((v, k) => data[k] = v);

        document.getElementById('ritualForm').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            document.getElementById('mainCard').innerHTML = "<h2>儀式完成</h2><p style='text-align:center; color:#666;'>這段記憶已溫柔存檔。<br>祝您有美好的一天。</p>";
        } catch (e) {
            alert("提交發生錯誤：" + e);
            document.getElementById('ritualForm').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
